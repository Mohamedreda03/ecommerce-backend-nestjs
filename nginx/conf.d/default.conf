# =============================================================================
# Nginx Virtual Host — HTTP (redirects to HTTPS in production)
# Replace "yourdomain.com" with your actual domain.
# =============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Upstream: NestJS app container
upstream nestjs_app {
    server app:3000;
    keepalive 32;
}

# ------- HTTP server — redirect all traffic to HTTPS -------
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt ACME challenge (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ------- HTTPS server -------
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Modern SSL config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (6 months)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Serve uploaded files directly (bypass Node.js for performance)
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Auth endpoints — strict rate limit (5 req/min per IP)
    location ~ ^/api/v1/auth/(login|forgot-password|register) {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://nestjs_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Stripe webhook — must NOT be rate-limited
    location /api/v1/payments/webhook {
        proxy_pass http://nestjs_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # All other API requests — standard rate limit (60 req/min per IP)
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://nestjs_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://nestjs_app;
        include /etc/nginx/conf.d/proxy_params.conf;
        access_log off;
    }
}
