# =============================================================================
# Production Docker Compose
# Runs the full stack: NestJS app + PostgreSQL + Redis + Nginx reverse proxy
# Usage: docker-compose -f docker-compose.prod.yml up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # NestJS Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ecommerce_app
    restart: unless-stopped
    env_file: .env.production
    environment:
      # Override host references so they point to Docker service names
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Persist uploaded files outside the container
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ecommerce_network

  # ---------------------------------------------------------------------------
  # PostgreSQL — Production database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: ecommerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No port 5432 exposed externally in production — only internal network access
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecommerce_network

  # ---------------------------------------------------------------------------
  # Redis — Cache, queues, rate limiting, idempotency
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    # No port exposed externally in production — internal access only
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - ecommerce_network

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy, SSL termination, static file serving
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: ecommerce_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - uploads_data:/var/www/uploads:ro
      # For SSL certificates (e.g. Let's Encrypt / Certbot)
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ecommerce_network

  # ---------------------------------------------------------------------------
  # Certbot — Automatic SSL certificate renewal (Let's Encrypt)
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: ecommerce_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renew certificates daily; does nothing if not due
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    networks:
      - ecommerce_network

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local

# =============================================================================
# Networks — Isolated production network
# =============================================================================
networks:
  ecommerce_network:
    driver: bridge
